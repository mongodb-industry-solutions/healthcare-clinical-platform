---
kind: pipeline
type: kubernetes
name: staging-combined

trigger:
  branch:
    - staging

steps:
  # Step 1: Build and publish backend Docker image
  - name: publish-backend
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/cds-healthcare-backend
      dockerfile: Dockerfile.backend
      context: .
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  # Step 2: Build and publish frontend Docker image
  - name: publish-frontend
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/cds-healthcare-frontend
      dockerfile: Dockerfile.frontend
      context: .
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
      build_args:
        - NEXT_PUBLIC_CHARTS_BASE_URL=https://charts.mongodb.com/charts-jeffn-zsdtj
        - NEXT_PUBLIC_CHARTS_CARE_GAP_DASHBOARD_ID=40eef755-0404-41ff-b74a-dbfbc4d309a4
    when:
      event:
        - push

  # Step 3: Deploy combined pod (frontend + backend sidecar) to Kubernetes
  - name: deploy-combined-staging
    image: public.ecr.aws/kanopy/drone-helm:v3
    settings:
      chart: mongodb/web-app
      chart_version: 4.30.0
      add_repos: [mongodb=https://10gen.github.io/helm-charts]
      namespace: industrysolutions
      release: cds-healthcare-platform
      values_files: ["environment/staging.yaml"]
      values:
        - "sidecarContainers[0].name=backend"
        - "sidecarContainers[0].image=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/cds-healthcare-backend:git-${DRONE_COMMIT_SHA:0:7}"
        - "sidecarContainers[0].containerPort=8000"
        - "image.tag=git-${DRONE_COMMIT_SHA:0:7}"
        - "image.repository=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/cds-healthcare-frontend"
        - "ingress.enabled=true"
        - "ingress.hosts[0]=cds-platform.industrysolutions.staging.corp.mongodb.com"
        - "mesh.enabled=true"
        # Frontend resources (reduced defaults for demos - increase if OOMKilled)
        - "resources.limits.cpu=500m"
        - "resources.limits.memory=512Mi"
        - "resources.requests.cpu=100m"
        - "resources.requests.memory=256Mi"
        # Backend sidecar resources (reduced defaults for demos - increase if OOMKilled)
        - "sidecarContainers[0].resources.limits.cpu=500m"
        - "sidecarContainers[0].resources.limits.memory=512Mi"
        - "sidecarContainers[0].resources.requests.cpu=100m"
        - "sidecarContainers[0].resources.requests.memory=256Mi"
      api_server: https://api.staging.corp.mongodb.com
      kubernetes_token:
        from_secret: staging_kubernetes_token
    when:
      branch:
        - staging
      event:
        - push

---
kind: pipeline
type: kubernetes
name: production-combined

trigger:
  branch:
    - main
  event:
    - push

steps:
  # Step 1: Build and publish backend Docker image
  - name: publish-backend-prod
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/cds-healthcare-backend-prod
      dockerfile: Dockerfile.backend
      context: .
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  # Step 2: Build and publish frontend Docker image
  - name: publish-frontend-prod
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/cds-healthcare-frontend-prod
      dockerfile: Dockerfile.frontend
      context: .
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
      build_args:
        - NEXT_PUBLIC_CHARTS_BASE_URL=https://charts.mongodb.com/charts-jeffn-zsdtj
        - NEXT_PUBLIC_CHARTS_CARE_GAP_DASHBOARD_ID=db74bec8-f2ea-41da-9ba4-64779190d567
    when:
      event:
        - push

  # Step 3: Deploy combined pod to production
  - name: deploy-combined-prod
    image: public.ecr.aws/kanopy/drone-helm:v3
    settings:
      chart: mongodb/web-app
      chart_version: 4.30.0
      add_repos: [mongodb=https://10gen.github.io/helm-charts]
      namespace: industrysolutions
      release: cds-platform-prod
      values_files: ["environment/production.yaml"]
      values:
        - "sidecarContainers[0].image=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/cds-healthcare-backend-prod:git-${DRONE_COMMIT_SHA:0:7}"
        - "image.tag=git-${DRONE_COMMIT_SHA:0:7}"
        - "image.repository=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/cds-healthcare-frontend-prod"
        - "ingress.enabled=true"
        - "ingress.hosts[0]=cds-platform.industrysolutions.prod.corp.mongodb.com"
        - "mesh.enabled=true"
        # Frontend resources (production - slightly higher for reliability)
        - "resources.limits.cpu=500m"
        - "resources.limits.memory=512Mi"
        - "resources.requests.cpu=150m"
        - "resources.requests.memory=256Mi"
        # Backend sidecar resources (production - slightly higher for reliability)
        - "sidecarContainers[0].resources.limits.cpu=500m"
        - "sidecarContainers[0].resources.limits.memory=512Mi"
        - "sidecarContainers[0].resources.requests.cpu=150m"
        - "sidecarContainers[0].resources.requests.memory=256Mi"
      api_server: https://api.prod.corp.mongodb.com
      kubernetes_token:
        from_secret: prod_kubernetes_token
    when:
      branch:
        - main
      event:
        - push
