env:
  NODE_ENV: staging
  AWS_REGION: us-east-1
  NEXT_PUBLIC_API_URL: "http://localhost:8000"

# Kanopy security and ownership (requires web-app chart v4.30.0+)
security:
  dataClassification: "Internal"
  dataDesignation: ["MI"]

ownership:
  driEmail: gio.rodriguez@mongodb.com

## Single Pod Containers
envSecrets:
  MONGODB_URI: cds-platform-secrets
  DATABASE_NAME: cds-platform-secrets

sidecarContainers:
  - name: backend
    image: 275662791714.dkr.ecr.us-east-1.amazonaws.com/cds-healthcare-backend:latest
    env:
      # MongoDB connection (from Kubernetes secret)
      - name: MONGODB_URI
        valueFrom:
          secretKeyRef:
            name: cds-platform-secrets
            key: MONGODB_URI

      - name: DATABASE_NAME
        valueFrom:
          secretKeyRef:
            name: cds-platform-secrets
            key: DATABASE_NAME

      - name: APP_NAME
        value: "IST-Shared"

      - name: QE_ENABLED
        value: "true"

      # Stable 96-byte master key shared across all environments.
      # Generate once with: python3 -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(96)).decode())"
      # Store the result in the cds-platform-secrets Kubernetes secret as QE_LOCAL_MASTER_KEY.
      - name: QE_LOCAL_MASTER_KEY
        valueFrom:
          secretKeyRef:
            name: cds-platform-secrets
            key: QE_LOCAL_MASTER_KEY

# Add IRSA configuration here, role here gives access to bedrock, s3, aws secrets manager
serviceAccount:
  enabled: true
  irsa:
    accountId: "275662791714"
    roleName: "kanopy-staging-cicd-irsa"